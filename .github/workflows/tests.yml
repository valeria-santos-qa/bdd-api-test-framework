name: API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Ruby dependencies
        run: bundle install

      - name: Run smoke tests
        run: bundle exec cucumber features/smoke/ --format json --out report/smoke.json

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install cucumber-html-reporter
        run: npm install cucumber-html-reporter

      - name: Generate smoke HTML report
        run: |
          node -e "
          const reporter = require('cucumber-html-reporter');
          const options = {
            theme: 'bootstrap',
            jsonFile: 'report/smoke.json',
            output: 'report/smoke_report.html',
            reportSuiteAsScenarios: true,
            launchReport: false
          };
          reporter.generate(options);
          "

      - name: Upload smoke HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-html-report
          path: report/smoke_report.html

  full-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Ruby dependencies
        run: bundle install

      - name: Run full test suite
        run: bundle exec cucumber --format json --out report/full.json

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install cucumber-html-reporter
        run: npm install cucumber-html-reporter

      - name: Generate full HTML report
        run: |
          node -e "
          const reporter = require('cucumber-html-reporter');
          const options = {
            theme: 'bootstrap',
            jsonFile: 'report/full.json',
            output: 'report/full_report.html',
            reportSuiteAsScenarios: true,
            launchReport: false
          };
          reporter.generate(options);
          "

      - name: Upload full HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-html-report
          path: report/full_report.html
